<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary ─────────────────────────────────────────────────────────── -->
    <!-- usePageTitle() in src/shared/hooks/ updates this per-route; this default
         is shown briefly before the first hook runs (and is the fallback for
         routes that haven't adopted the hook yet). -->
    <title>Intergalactic Soccer League</title>
    <meta name="description" content="A Blaseball-inspired social experiment browser game. Watch AI-simulated intergalactic soccer matches, bet Intergalactic Credits, and vote with fellow fans to reshape your club's future." />
    <meta name="theme-color" content="#111" />

    <!-- ── Icons ───────────────────────────────────────────────────────────── -->
    <!-- Dedicated square mark (soccer ball on Galactic Abyss, lunar-dust hairline
         box) — legible down to 16px, unlike the tall isl-logo crest. SVG is
         preferred by modern browsers; the .ico (16/32/48) is the legacy fallback
         (sizes="any" nudges Chrome to pick the SVG). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (Facebook, LinkedIn, Slack, Discord) ─────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Intergalactic Soccer League" />
    <meta property="og:title" content="Intergalactic Soccer League" />
    <meta property="og:description" content="A Blaseball-inspired social experiment browser game. Watch AI-simulated intergalactic soccer matches, bet Intergalactic Credits, and vote with fellow fans to reshape your club's future." />
    <meta property="og:url" content="https://steverowley.github.io/soccer-league/" />
    <!-- Stopgap: existing isl-logo.png (272x360) renders non-blank previews.
         Proper 1200x630 OG asset (32 crests + tagline) is a follow-up; see PR
         body. -->
    <meta property="og:image" content="https://steverowley.github.io/soccer-league/isl-logo.png" />
    <meta property="og:image:alt" content="Intergalactic Soccer League logo" />

    <!-- ── Twitter / X ─────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Intergalactic Soccer League" />
    <meta name="twitter:description" content="A Blaseball-inspired social experiment browser game. Watch AI-simulated intergalactic soccer matches, bet Intergalactic Credits, and vote with fellow fans." />
    <meta name="twitter:image" content="https://steverowley.github.io/soccer-league/isl-logo.png" />

    <style>
      @font-face { font-family: 'Space Mono'; src: url('/fonts/SpaceMono-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Space Mono'; src: url('/fonts/SpaceMono-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: 'Space Mono'; src: url('/fonts/SpaceMono-Italic.ttf') format('truetype'); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: 'Space Mono'; src: url('/fonts/SpaceMono-BoldItalic.ttf') format('truetype'); font-weight: 700; font-style: italic; font-display: swap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
