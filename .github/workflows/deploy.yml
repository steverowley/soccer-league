name: Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # `administration: write` lets configure-pages@v4 create the Pages
  # site on first run via the REST endpoint POST /repos/{owner}/{repo}/pages.
  # The `pages` scope is enough to PUBLISH to an existing site but is
  # NOT enough to CREATE one — that endpoint sits under repo
  # administration.  Without this scope the workflow fails with:
  #   "Create Pages site failed: HttpError: Resource not accessible by integration"
  # the very first time it runs against a repo where Pages hasn't yet
  # been turned on.  Once the site exists the auto-enable call is a
  # no-op, so this scope is only used during first-time provisioning.
  administration: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: main
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ddtpbipkqamuxnvupddc.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_bbRGJ2fM9IQ9typ5x_Kwlg_R2gtgasP

      # `enablement: true` lets the action create the Pages site on
      # first run if it isn't already enabled in repo settings.  Without
      # it the workflow fails with "Get Pages site failed … Not Found"
      # the very first time it runs against a repo where Pages hasn't
      # been turned on under Settings → Pages → "Build and deployment".
      # The workflow already grants `pages: write` + `id-token: write`
      # in the top-level permissions block so the auto-enable call has
      # the credentials it needs.
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-and-deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ddtpbipkqamuxnvupddc.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_bbRGJ2fM9IQ9typ5x_Kwlg_R2gtgasP

      # `enablement: true` lets the action create the Pages site on
      # first run if it isn't already enabled in repo settings.  Without
      # it the workflow fails with "Get Pages site failed … Not Found"
      # the very first time it runs against a repo where Pages hasn't
      # been turned on under Settings → Pages → "Build and deployment".
      # The workflow already grants `pages: write` + `id-token: write`
      # in the top-level permissions block so the auto-enable call has
      # the credentials it needs.
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
