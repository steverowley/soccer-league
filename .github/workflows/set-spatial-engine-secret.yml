name: Set USE_SPATIAL_ENGINE secret

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.104.0

      - name: Set USE_SPATIAL_ENGINE=true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set USE_SPATIAL_ENGINE=true \
            --project-ref ddtpbipkqamuxnvupddc
