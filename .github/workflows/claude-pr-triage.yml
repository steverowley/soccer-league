name: claude-pr-triage

# ── Why ───────────────────────────────────────────────────────────────────
# Wakes a fresh Claude Code session on PR events (review comments,
# reviews, CI failures, @claude mentions) so reaction is decoupled from
# the lifetime of the session that opened the PR.
#
# Background: subscribe_pr_activity bindings die when the originating
# session's container is reclaimed.  Long-running parallel sessions
# routinely orphan their PRs.  This workflow turns each PR event into
# an inbound trigger that spawns a new, scoped agent on demand —
# stateless and not subject to container reclaim.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   * CLAUDE_CODE_OAUTH_TOKEN — issued via `claude setup-token` on a
#     trusted machine.  Authenticates the action against the Claude
#     API on behalf of the repo owner.
#
# Cost note: every triggering event spawns a session.  The triage
# prompt instructs the agent to skip cleanly when no action is needed.

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  check_run:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

concurrency:
  group: claude-pr-triage-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    # Skip self-authored noise: the action's own comments, drafts, and
    # non-PR issue_comment events.  check_run only triggers on failure.
    if: |
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review' && github.event.review.state != 'commented') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion == 'failure' && github.event.check_run.pull_requests[0] != null)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A GitHub event fired on this repository. Triage it.

            Event: ${{ github.event_name }}
            Action: ${{ github.event.action }}
            PR: #${{ github.event.pull_request.number || github.event.issue.number || github.event.check_run.pull_requests[0].number }}
            Actor: ${{ github.event.sender.login }}

            Steps:
              1. Read the PR (diff, files, recent comments) so you have full context.
              2. Decide if this event is actionable. Skip cleanly if it is a
                 self-authored event, an informational bot message (Supabase
                 Preview ignoring the PR, deploy-skipped notices), or a check
                 that has since been re-run green.
              3. If the event is a review comment or review with concrete
                 findings: investigate each finding. If you are confident in
                 the fix and it is small and not architecturally significant,
                 push the fix to the PR's head branch. Otherwise reply to the
                 thread explaining why you cannot act and what the human
                 needs to decide.
              4. If the event is a CI failure: read the failed job log,
                 diagnose the root cause, and push a fix to the PR's head
                 branch. Do NOT re-run blindly — fix the underlying problem.
              5. If the event is an @claude mention: do exactly what the
                 mention asks, no more.

            Hard rules:
              - Never push to main, dev, or any branch other than the PR's
                head branch.
              - Never resolve a review thread you cannot actually address.
              - Respect the project's CLAUDE.md and the Vision pillars.
              - If you push a fix, write a Conventional Commits message.
              - Keep your reply terse: one or two sentences on what you did
                or why you skipped. The diff is the record.
