<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--isl-bg);
    color: var(--isl-fg);
    padding: 28px 32px;
    box-sizing: border-box;
    width: 700px;
    font-family: var(--isl-font-mono);
  }
  .grid { display: grid; grid-template-columns: auto 1fr; gap: 18px 24px; align-items: center; }
  .btn {
    font-family: var(--isl-font-mono); font-weight: 700; font-size: 16px; text-transform: uppercase;
    padding: 16px 32px; border: 1px solid transparent; line-height: 1; cursor: pointer; justify-self: start;
    transition: box-shadow .12s linear, filter .12s linear;
  }
  .cta { background: var(--isl-astro-explorer); border-color: var(--isl-astro-explorer); color: var(--isl-galactic-abyss); }
  .cta:hover { box-shadow: var(--isl-glow-cta); }
  .architect { background: var(--isl-quantum-purple); border-color: var(--isl-quantum-purple); color: var(--isl-galactic-abyss); }
  .architect:hover { box-shadow: 0 0 18px 2px rgba(154,92,244,0.7); }
  .tertiary { display: inline-flex; align-items: center; gap: 8px; background: none; border: 0; color: var(--isl-lunar-dust); padding: 0; font-weight: 700; font-size: 16px; text-transform: uppercase; cursor: pointer; transition: text-shadow .12s linear; }
  .tertiary:hover { text-shadow: var(--isl-glow-light); }
  .tertiary svg { display: block; }
  .meta { font-size: 12px; color: var(--isl-fg-muted); }
</style>
</head>
<body>
  <div class="grid">
    <button class="btn cta">Sign up</button>
    <span class="meta">Active / CTA — Astro Explorer fill · hover ramps the orange glow</span>
    <button class="btn architect">Create account</button>
    <span class="meta">Architect action — Quantum Purple fill · hover ramps the purple glow</span>
    <button class="tertiary">View all matches
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M0 0 L9 5.196 L0 10.392 Z" fill="currentColor"/></svg>
    </button>
    <span class="meta">Tertiary — text + triangle · hover light glow</span>
  </div>
</body>
</html>
