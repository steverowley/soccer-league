<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--isl-bg);
    color: var(--isl-fg);
    padding: 28px 32px;
    box-sizing: border-box;
    width: 700px;
    font-family: var(--isl-font-mono);
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .col { text-align: center; }
  .box { width: 96px; height: 72px; border: 1px solid var(--isl-border); margin: 0 auto 12px; }
  .box.bold { border-width: 2px; }
  .circle { width: 72px; height: 72px; border-radius: 50%; border: 1px solid var(--isl-border); margin: 0 auto 12px; }
  .cap { font-size: 13px; }
  .meta { font-size: 11px; color: var(--isl-fg-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="col"><div class="box"></div><div class="cap">radius 0</div><div class="meta">default — square</div></div>
  <div class="col"><div class="circle"></div><div class="cap">radius 50%</div><div class="meta">badges / dots only</div></div>
  <div class="col"><div class="box"></div><div class="cap">stroke 1px</div><div class="meta">cards · dividers</div></div>
  <div class="col"><div class="box bold"></div><div class="cap">stroke 2px</div><div class="meta">bars · score lines</div></div>
</body>
</html>
