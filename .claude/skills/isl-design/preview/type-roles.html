<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--isl-bg);
    color: var(--isl-fg);
    padding: 28px 32px;
    box-sizing: border-box;
    width: 700px;
    font-family: var(--isl-font-mono);
  }
  .block { padding: 13px 0; border-bottom: 1px solid var(--isl-border-faint); }
  .block:last-child { border-bottom: 0; }
  .meta { color: var(--isl-fg-muted); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="block">
    <span class="isl-eyebrow">I&nbsp;&nbsp;·&nbsp;&nbsp;STANDINGS ACROSS THE ABYSS</span>
    <div class="meta">Eyebrow — Space Mono Bold 16, uppercase, middot index</div>
  </div>
  <div class="block">
    <span class="isl-label">BROWSE LEAGUES&nbsp;&nbsp;&nbsp;VIEW ALL MATCHES&nbsp;&nbsp;&nbsp;LIVE NOW</span>
    <div class="meta">UI label — Space Mono Bold 16, uppercase</div>
  </div>
  <div class="block">
    <span class="isl-caption">Teams from the inner rocky planets, including Earth, Mars, Venus, and Mercury.</span>
    <div class="meta">Caption — Space Mono Regular 16, looser leading</div>
  </div>
</body>
</html>
