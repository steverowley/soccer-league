<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--isl-bg);
    color: var(--isl-fg);
    padding: 36px 32px;
    box-sizing: border-box;
    width: 700px;
    font-family: var(--isl-font-mono);
    display: flex;
    gap: 30px;
    align-items: center;
    justify-content: space-around;
  }
  .col { text-align: center; }
  .dot { width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 16px; }
  .cap { font-size: 13px; }
  .meta { font-size: 11px; color: var(--isl-fg-muted); margin-top: 4px; max-width: 140px; }
</style>
</head>
<body>
  <div class="col">
    <div class="dot" style="background: var(--isl-quantum-purple); box-shadow: var(--isl-glow-purple), var(--isl-glow-purple-far);"></div>
    <div class="cap">glow-purple</div>
    <div class="meta">focus / Architect — 6px tight + ambient bloom</div>
  </div>
  <div class="col">
    <div class="dot" style="background: var(--isl-solar-flare); box-shadow: var(--isl-glow-live);"></div>
    <div class="cap">glow-live</div>
    <div class="meta">live momentum bar bloom — red, 50px</div>
  </div>
  <div class="col">
    <div class="dot" style="background: var(--isl-lunar-dust); box-shadow: var(--isl-glow-light);"></div>
    <div class="cap">glow-light</div>
    <div class="meta">hovered tertiary link</div>
  </div>
</body>
</html>
