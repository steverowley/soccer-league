<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Web UI Kit" subtitle="ISL public web app — home, live match, standings (interactive)" viewport="1320x820" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intergalactic Soccer League</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--isl-galactic-abyss); }
  body { -webkit-font-smoothing: antialiased; overflow-x: auto; }
  ::selection { background: var(--isl-quantum-purple); color: var(--isl-galactic-abyss); }
  input[type="range"] { height: 4px; }
  /* Desktop product recreation (designed at 1920). Keep a min canvas so the
     nav / layout never clip — narrow viewports scroll horizontally instead. */
  #root > div { min-width: 1200px; }
  @media (max-width: 1400px) {
    #root > div { padding-left: 64px !important; padding-right: 64px !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="LiveMatch.jsx"></script>
  <script type="text/babel" src="Steps.jsx"></script>
  <script type="text/babel" src="Standings.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
